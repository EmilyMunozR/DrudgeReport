<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inicio de Sesión</title>
  <link rel="stylesheet" href="style.css">
  <script src="login.js" defer></script>
</head>
<body>
  <header>
    <h1>Drudge Report - Login</h1>
  </header>

  <form id="loginForm">
    <div class="form-group">
      <label for="username">Usuario:</label>
      <input type="text" id="username" required>
    </div>

    <div class="form-group">
      <label for="password">Contraseña:</label>
      <input type="password" id="password" required>
    </div>

    <button type="submit">Iniciar Sesión</button>
    <p id="loginMessage"></p>
  </form>

  <div id="mfaSection" class="hidden">
    <h2>Autenticación Multifactor</h2>
    <p>Ingresa el código de tu aplicación Google Authenticator:</p>
    <input type="text" id="mfaCode" placeholder="Código de 6 dígitos">
    <button id="mfaSubmit">Confirmar</button>
    <p id="mfaMessage"></p>
  </div>

  <div class="recover">
    <a href="#" id="forgotPassword">¿Olvidaste tu contraseña?</a>
    <div id="recoverSection" class="hidden">
      <h2>Recuperar Contraseña</h2>
      <form id="recoverForm">
        <label for="recoverEmail">Correo:</label>
        <input type="email" id="recoverEmail" required>
        <button type="submit">Enviar enlace</button>
        <p id="recoverMessage"></p>
      </form>
    </div>
  </div>

</body>
</html>
